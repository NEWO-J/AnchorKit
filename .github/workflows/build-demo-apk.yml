name: Build Demo APK

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build demo APK
        run: ./gradlew :demo-app:assembleDebug
        env:
          ANCHORKIT_BASE_URL: https://api.anchorkit.net

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          files: demo-app/build/outputs/apk/debug/demo-app-debug.apk
