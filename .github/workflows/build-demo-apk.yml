name: Build Demo APK

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag to attach APK to'
        required: true
        default: 'v1.0.1'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $RUNNER_TEMP/release.jks

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build release APK
        run: ./gradlew :demo-app:assembleRelease
        env:
          ANCHORKIT_BASE_URL: https://api.anchorkit.net
          KEYSTORE_FILE: ${{ runner.temp }}/release.jks
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Rename APK
        env:
          VERSION: ${{ github.event.release.tag_name || inputs.tag_name }}
        run: |
          mv demo-app/build/outputs/apk/release/demo-app-release.apk \
             demo-app/build/outputs/apk/release/anchorkit-demo-${VERSION}.apk

      - name: Upload APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name || inputs.tag_name }}
          files: demo-app/build/outputs/apk/release/anchorkit-demo-*.apk
