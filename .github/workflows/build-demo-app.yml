name: Build Demo App

on:
  push:
    tags: ["v*.*.*"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build demo-app debug APK
        run: ./gradlew :demo-app:assembleDebug --stacktrace
        env:
          ANCHORKIT_BASE_URL: ${{ secrets.ANCHORKIT_BASE_URL }}

      - name: Rename APK
        run: mv demo-app/build/outputs/apk/debug/demo-app-debug.apk demo-app/build/outputs/apk/debug/demo-app.apk

      # On PRs: upload as a workflow artifact only
      - name: Upload artifact (PR builds)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: demo-app
          path: demo-app/build/outputs/apk/debug/demo-app.apk
          retention-days: 14

      # On version tags: publish a GitHub release
      - name: Publish to GitHub Releases
        if: startsWith(github.ref, 'refs/tags/v')
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ github.ref_name }}
          name: "${{ github.ref_name }}"
          body: |
            AnchorKit Demo App — built from SDK release ${{ github.ref_name }}.
          prerelease: false
          allowUpdates: true
          removeArtifacts: true
          artifacts: demo-app/build/outputs/apk/debug/demo-app.apk
          token: ${{ secrets.GITHUB_TOKEN }}
