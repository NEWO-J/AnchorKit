name: Build Demo App

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build demo-app debug APK
        run: ./gradlew :demo-app:assembleDebug --stacktrace
        env:
          ANCHORKIT_BASE_URL: ${{ secrets.ANCHORKIT_BASE_URL }}

      # On PRs: upload as a workflow artifact only
      - name: Upload artifact (PR builds)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-debug
          path: demo-app/build/outputs/apk/debug/demo-app-debug.apk
          retention-days: 14

      # On main: create/update the rolling "latest" release
      - name: Publish to GitHub Releases
        if: github.ref == 'refs/heads/main'
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest Build"
          body: |
            Automatically built from `main`.
            Commit: ${{ github.sha }}
          prerelease: true
          allowUpdates: true
          removeArtifacts: true
          artifacts: demo-app/build/outputs/apk/debug/demo-app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
