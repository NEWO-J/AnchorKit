name: Build Demo App

on:
  push:
    branches: ["main", "claude/**"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    name: Assemble debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build demo-app debug APK
        run: ./gradlew :demo-app:assembleDebug --stacktrace
        env:
          ANCHORKIT_API_KEY: ${{ secrets.ANCHORKIT_API_KEY }}
          ANCHORKIT_BASE_URL: ${{ secrets.ANCHORKIT_BASE_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: demo-app-debug
          path: demo-app/build/outputs/apk/debug/demo-app-debug.apk
          retention-days: 14
