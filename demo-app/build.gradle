plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'io.framechain.demo'
    compileSdk 34

    defaultConfig {
        applicationId "io.framechain.demo"
        minSdk 24
        targetSdk 34
        versionCode 1
        versionName "1.0"

        // Override in local.properties or CI env:
        //   FRAMECHAIN_API_KEY=<key>
        //   FRAMECHAIN_BASE_URL=https://api.framechain.io
        def apiKey = project.findProperty("FRAMECHAIN_API_KEY") ?: ""
        def baseUrl = project.findProperty("FRAMECHAIN_BASE_URL") ?: "https://api.framechain.io"
        buildConfigField "String", "FRAMECHAIN_API_KEY", "\"${apiKey}\""
        buildConfigField "String", "FRAMECHAIN_BASE_URL", "\"${baseUrl}\""
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    buildFeatures {
        viewBinding true
        buildConfig true
    }
}

dependencies {
    implementation project(':framechain-android-sdk')

    implementation 'org.jetbrains.kotlin:kotlin-stdlib:1.9.0'
    implementation 'org.jetbrains.kotlinx:kotlinx-coroutines-android:1.7.3'

    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.appcompat:appcompat:1.6.1'
    implementation 'com.google.android.material:material:1.11.0'
    implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.6.2'

    testImplementation 'junit:junit:4.13.2'
}
